<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Repos</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --card: #13131c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  header {
    margin-bottom: 48px;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.4rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
  }

  h1 span { color: var(--accent); }

  /* Status area */
  #status {
    margin-top: 40px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-height: 20px;
  }

  #status.error { color: var(--accent2); }
  #status.loading { color: var(--accent); }

  /* Profile bar */
  #profile {
    display: none;
    align-items: center;
    gap: 16px;
    margin-top: 36px;
    padding: 18px 20px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
  }

  #profile.visible { display: flex; }
  #profile:hover { border-color: var(--accent); }

  #profile img {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--accent);
  }

  #profile-name { color: var(--text); font-weight: 700; font-size: 1.1rem; }

  #profile-meta {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  #profile-meta span { color: var(--accent); }

  /* Sort/filter bar */
  #controls {
    display: none;
    gap: 10px;
    margin-top: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  #controls.visible { display: flex; }

  .pill {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .pill:hover, .pill.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,0.06);
  }

  #search-filter {
    flex: 1;
    min-width: 160px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 100px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search-filter:focus { border-color: var(--accent); }
  #search-filter::placeholder { color: var(--muted); }

  /* Repo grid */
  #repos {
    margin-top: 24px;
    display: grid;
    gap: 12px;
  }

  .repo-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 20px 22px;
    text-decoration: none;
    color: var(--text);
    display: block;
    transition: border-color 0.2s, transform 0.15s;
    animation: fadeUp 0.3s both;
  }

  .repo-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .repo-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }

  .repo-name {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  .repo-name .fork-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    background: rgba(255,107,53,0.15);
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.3);
    padding: 2px 7px;
    border-radius: 100px;
    vertical-align: middle;
    margin-left: 8px;
    letter-spacing: 0.1em;
  }

  .repo-desc {
    font-size: 0.875rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 14px;
  }

  .repo-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .repo-meta span { display: flex; align-items: center; gap: 5px; }

  .lang-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .repo-stars { color: #f0c040; }
  .repo-forks { color: var(--muted); }

  .updated { margin-left: auto; }

  /* Skeleton loader */
  .skeleton {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 20px 22px;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .skel-line {
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
  }

  footer {
    margin-top: 60px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <p class="eyebrow">// GitHub Repos</p>
    <h1><span>Launcher.</span></h1>
  </header>

  <div id="status"></div>
  <a id="profile" href="https://github.com/sambayford" target="_blank" rel="noopener" style="text-decoration:none;cursor:pointer;">
    <img id="profile-avatar" src="" alt="">
    <div>
      <div id="profile-name"></div>
      <div id="profile-meta"></div>
    </div>
  </a>
  <div id="controls">
    <input type="text" id="search-filter" placeholder="filter repos...">
    <button class="pill active" data-sort="updated">Recent</button>
    <button class="pill" data-sort="stars">Stars</button>
    <button class="pill" data-sort="name">A–Z</button>
    <button class="pill" data-sort="forks">Forks</button>
  </div>
  <div id="repos"></div>

  <footer>Live data via GitHub public API · No auth required</footer>
</div>

<script>
  const LANG_COLORS = {
    JavaScript:'#f1e05a', TypeScript:'#3178c6', Python:'#3572A5',
    HTML:'#e34c26', CSS:'#563d7c', Rust:'#dea584', Go:'#00ADD8',
    Java:'#b07219', 'C++':"#f34b7d", C:'#555555', Ruby:'#701516',
    Swift:'#F05138', Kotlin:'#A97BFF', PHP:'#4F5D95', Shell:'#89e051',
    Vue:'#41b883', Svelte:'#ff3e00', Dart:'#00B4AB', 'C#':'#178600',
  };

  const USERNAME = 'sambayford';
  let allRepos = [];
  let sortKey = 'updated';

  document.querySelectorAll('.pill[data-sort]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pill[data-sort]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sortKey = btn.dataset.sort;
      renderRepos();
    });
  });

  document.getElementById('search-filter').addEventListener('input', renderRepos);

  async function fetchRepos() {
    const username = USERNAME;
    const status = document.getElementById('status');
    const reposEl = document.getElementById('repos');
    const profileEl = document.getElementById('profile');
    const controlsEl = document.getElementById('controls');

    status.className = 'loading';
    status.textContent = `// loading repos...`;
    reposEl.innerHTML = skeletons(6);
    profileEl.classList.remove('visible');
    controlsEl.classList.remove('visible');

    try {
      const userRes = await fetch(`https://api.github.com/users/${username}`);
      if (!userRes.ok) throw new Error(`User not found (${userRes.status}).`);
      const user = await userRes.json();

      let page = 1, repos = [];
      while (true) {
        const r = await fetch(`https://api.github.com/users/${username}/repos?per_page=100&page=${page}`);
        if (!r.ok) throw new Error(`Failed to fetch repos (page ${page}).`);
        const batch = await r.json();
        repos = repos.concat(batch);
        if (batch.length < 100) break;
        page++;
      }

      allRepos = repos;

      document.getElementById('profile-avatar').src = user.avatar_url;
      document.getElementById('profile-name').textContent = user.name || user.login;
      document.getElementById('profile-meta').innerHTML =
        `<span>${repos.length} public repos</span>`;
      profileEl.classList.add('visible');
      controlsEl.classList.add('visible');

      status.className = '';
      status.textContent = `// ${repos.length} repos loaded`;

      renderRepos();
    } catch (err) {
      status.className = 'error';
      status.textContent = `// error: ${err.message}`;
      reposEl.innerHTML = '';
    }
  }

  fetchRepos();

  function renderRepos() {
    const filter = document.getElementById('search-filter').value.toLowerCase();

    let list = allRepos.filter(r =>
      r.name.toLowerCase().includes(filter) ||
      (r.description || '').toLowerCase().includes(filter)
    );

    list.sort((a, b) => {
      if (sortKey === 'updated') return new Date(b.pushed_at) - new Date(a.pushed_at);
      if (sortKey === 'stars')   return b.stargazers_count - a.stargazers_count;
      if (sortKey === 'forks')   return b.forks_count - a.forks_count;
      if (sortKey === 'name')    return a.name.localeCompare(b.name);
      return 0;
    });

    const reposEl = document.getElementById('repos');
    if (list.length === 0) {
      reposEl.innerHTML = `<p style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin-top:8px;">// no repos match filter</p>`;
      return;
    }

    reposEl.innerHTML = list.map((r, i) => repoCard(r, i)).join('');
  }

  function repoCard(r, i) {
    const color = LANG_COLORS[r.language] || '#888';
    const updated = timeAgo(r.pushed_at);
    const desc = r.description ? `<p class="repo-desc">${escHtml(r.description)}</p>` : '';
    const fork = r.fork ? `<span class="fork-badge">FORK</span>` : '';
    const langDot = r.language
      ? `<span><span class="lang-dot" style="background:${color}"></span>${escHtml(r.language)}</span>`
      : '';

    const pagesUrl = `https://sambayford.github.io/${r.name}/`;
    return `
      <a class="repo-card" href="${pagesUrl}" target="_blank" rel="noopener"
         style="animation-delay:${Math.min(i * 40, 400)}ms">
        <div class="repo-top">
          <span class="repo-name">${escHtml(r.name)}${fork}</span>
        </div>
        ${desc}
        <div class="repo-meta">
          ${langDot}
          ${r.stargazers_count > 0 ? `<span class="repo-stars">★ ${r.stargazers_count}</span>` : ''}
          ${r.forks_count > 0 ? `<span class="repo-forks">⑂ ${r.forks_count}</span>` : ''}
          <span class="updated">↻ ${updated}</span>
        </div>
      </a>`;
  }

  function skeletons(n) {
    return Array.from({length: n}, () => `
      <div class="skeleton">
        <div class="skel-line" style="width:40%;height:16px"></div>
        <div class="skel-line" style="width:75%;height:12px;opacity:.5"></div>
        <div class="skel-line" style="width:55%;height:12px;opacity:.5"></div>
        <div class="skel-line" style="width:30%;height:11px;margin-top:6px;opacity:.3"></div>
      </div>`).join('');
  }

  function timeAgo(iso) {
    const d = Date.now() - new Date(iso);
    const m = Math.floor(d / 60000);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    const days = Math.floor(h / 24);
    if (days < 30) return `${days}d ago`;
    const months = Math.floor(days / 30);
    if (months < 12) return `${months}mo ago`;
    return `${Math.floor(months / 12)}y ago`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }


  function renderRepos() {
    const filter = document.getElementById('search-filter').value.toLowerCase();

    let list = allRepos.filter(r =>
      r.name.toLowerCase().includes(filter) ||
      (r.description || '').toLowerCase().includes(filter)
    );

    list.sort((a, b) => {
      if (sortKey === 'updated') return new Date(b.pushed_at) - new Date(a.pushed_at);
      if (sortKey === 'stars')   return b.stargazers_count - a.stargazers_count;
      if (sortKey === 'forks')   return b.forks_count - a.forks_count;
      if (sortKey === 'name')    return a.name.localeCompare(b.name);
      return 0;
    });

    const reposEl = document.getElementById('repos');
    if (list.length === 0) {
      reposEl.innerHTML = `<p style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin-top:8px;">// no repos match filter</p>`;
      return;
    }

    reposEl.innerHTML = list.map((r, i) => repoCard(r, i)).join('');
  }
</script>
</body>
</html>
